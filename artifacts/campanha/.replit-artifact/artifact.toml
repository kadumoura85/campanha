kind = "web"
previewPath = "/"
title = "Campanha Política"
version = "1.0.0"
id = "artifacts/campanha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20804

[services.development]
run = "pnpm --filter @workspace/campanha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campanha", "run", "build" ]
publicDir = "artifacts/campanha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20804"
BASE_PATH = "/"
