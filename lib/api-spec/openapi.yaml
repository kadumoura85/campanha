openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: API specification for campanha politica CRM
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: usuarios
  - name: contatos
  - name: regioes
  - name: eventos
  - name: configuracao
  - name: dashboard
  - name: observacoes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usuarios:
    get:
      operationId: listUsuarios
      tags: [usuarios]
      parameters:
        - name: tipo
          in: query
          schema:
            type: ["string", "null"]
        - name: coordenador_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: regiao_id
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Usuario"
    post:
      operationId: createUsuario
      tags: [usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUsuarioBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usuarios/{id}:
    get:
      operationId: getUsuario
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUsuario
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsuarioBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUsuario
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contatos:
    get:
      operationId: listContatos
      tags: [contatos]
      parameters:
        - name: bairro
          in: query
          schema:
            type: ["string", "null"]
        - name: nivel
          in: query
          schema:
            type: ["string", "null"]
        - name: lider_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: coordenador_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: regiao_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: busca
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contato"
    post:
      operationId: createContato
      tags: [contatos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContatoBody"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contato"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contatos/{id}:
    get:
      operationId: getContato
      tags: [contatos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contato"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateContato
      tags: [contatos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContatoBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contato"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContato
      tags: [contatos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /regioes:
    get:
      operationId: listRegioes
      tags: [regioes]
      responses:
        "200":
          description: List of regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegiaoComStats"
    post:
      operationId: createRegiao
      tags: [regioes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegiaoBody"
      responses:
        "201":
          description: Region created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Regiao"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /regioes/{id}:
    get:
      operationId: getRegiao
      tags: [regioes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegiaoDetalhe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRegiao
      tags: [regioes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRegiaoBody"
      responses:
        "200":
          description: Updated region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Regiao"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRegiao
      tags: [regioes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /regioes/{id}/observacoes:
    get:
      operationId: listObservacoes
      tags: [observacoes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ObservacaoRegiao"
    post:
      operationId: createObservacao
      tags: [observacoes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateObservacaoBody"
      responses:
        "201":
          description: Observation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservacaoRegiao"

  /eventos:
    get:
      operationId: listEventos
      tags: [eventos]
      parameters:
        - name: regiao_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: tipo_evento
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evento"
    post:
      operationId: createEvento
      tags: [eventos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventoBody"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evento"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /eventos/{id}:
    patch:
      operationId: updateEvento
      tags: [eventos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventoBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evento"
    delete:
      operationId: deleteEvento
      tags: [eventos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /configuracao:
    get:
      operationId: getConfiguracao
      tags: [configuracao]
      responses:
        "200":
          description: Campaign configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuracao"
    patch:
      operationId: updateConfiguracao
      tags: [configuracao]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfiguracaoBody"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuracao"

  /dashboard/vereador:
    get:
      operationId: getDashboardVereador
      tags: [dashboard]
      responses:
        "200":
          description: Vereador dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardVereador"

  /dashboard/coordenador-geral:
    get:
      operationId: getDashboardCoordenadorGeral
      tags: [dashboard]
      responses:
        "200":
          description: Coordenador geral dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCoordenadorGeral"

  /dashboard/coordenador-regional:
    get:
      operationId: getDashboardCoordenadorRegional
      tags: [dashboard]
      responses:
        "200":
          description: Coordenador regional dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCoordenadorRegional"

  /dashboard/lider:
    get:
      operationId: getDashboardLider
      tags: [dashboard]
      responses:
        "200":
          description: Lider dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardLider"

  /evolucao-semanal:
    get:
      operationId: getEvolucaoSemanal
      tags: [dashboard]
      responses:
        "200":
          description: Weekly evolution data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvolucaoSemanal"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    LoginBody:
      type: object
      properties:
        telefone:
          type: string
        senha:
          type: string
      required: [telefone, senha]

    LoginResponse:
      type: object
      properties:
        usuario:
          $ref: "#/components/schemas/Usuario"
        token:
          type: string
      required: [usuario, token]

    Usuario:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        telefone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        tipo:
          type: string
          enum: [super_admin, vereador, coordenador_geral, coordenador_regional, lider]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]
        bairro_regiao:
          type: ["string", "null"]
        ativo:
          type: boolean
        created_at:
          type: string
          format: date-time
        regiao_nome:
          type: ["string", "null"]
        coordenador_nome:
          type: ["string", "null"]
      required: [id, nome, tipo, ativo, created_at]

    CreateUsuarioBody:
      type: object
      properties:
        nome:
          type: string
        telefone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        senha:
          type: string
        tipo:
          type: string
          enum: [super_admin, vereador, coordenador_geral, coordenador_regional, lider]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]
        bairro_regiao:
          type: ["string", "null"]
        ativo:
          type: boolean
      required: [nome, senha, tipo]

    UpdateUsuarioBody:
      type: object
      properties:
        nome:
          type: ["string", "null"]
        telefone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        tipo:
          type: ["string", "null"]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]
        bairro_regiao:
          type: ["string", "null"]
        ativo:
          type: ["boolean", "null"]

    Contato:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        telefone:
          type: string
        bairro:
          type: ["string", "null"]
        rua_referencia:
          type: ["string", "null"]
        nivel:
          type: string
          enum: [contato, simpatizante, fechado]
        observacao:
          type: ["string", "null"]
        lider_id:
          type: ["integer", "null"]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        lider_nome:
          type: ["string", "null"]
        coordenador_nome:
          type: ["string", "null"]
        regiao_nome:
          type: ["string", "null"]
      required: [id, nome, telefone, nivel, created_at, updated_at]

    CreateContatoBody:
      type: object
      properties:
        nome:
          type: string
        telefone:
          type: string
        bairro:
          type: ["string", "null"]
        rua_referencia:
          type: ["string", "null"]
        nivel:
          type: string
          enum: [contato, simpatizante, fechado]
        observacao:
          type: ["string", "null"]
        lider_id:
          type: ["integer", "null"]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]
      required: [nome, telefone, nivel]

    UpdateContatoBody:
      type: object
      properties:
        nome:
          type: ["string", "null"]
        telefone:
          type: ["string", "null"]
        bairro:
          type: ["string", "null"]
        rua_referencia:
          type: ["string", "null"]
        nivel:
          type: ["string", "null"]
        observacao:
          type: ["string", "null"]
        lider_id:
          type: ["integer", "null"]
        coordenador_id:
          type: ["integer", "null"]
        regiao_id:
          type: ["integer", "null"]

    Regiao:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: ["string", "null"]
        coordenador_regional_id:
          type: ["integer", "null"]
        cor:
          type: string
        prioridade:
          type: string
          enum: [normal, atencao, prioritaria]
        observacao_estrategica:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, nome, cor, prioridade, created_at, updated_at]

    RegiaoComStats:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: ["string", "null"]
        coordenador_regional_id:
          type: ["integer", "null"]
        coordenador_nome:
          type: ["string", "null"]
        cor:
          type: string
        prioridade:
          type: string
          enum: [normal, atencao, prioritaria]
        observacao_estrategica:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        total_contatos:
          type: integer
        total_simpatizantes:
          type: integer
        total_fechados:
          type: integer
        total_lideres:
          type: integer
      required: [id, nome, cor, prioridade, created_at, updated_at, total_contatos, total_simpatizantes, total_fechados, total_lideres]

    RegiaoDetalhe:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: ["string", "null"]
        coordenador_regional_id:
          type: ["integer", "null"]
        coordenador_nome:
          type: ["string", "null"]
        cor:
          type: string
        prioridade:
          type: string
          enum: [normal, atencao, prioritaria]
        observacao_estrategica:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        total_contatos:
          type: integer
        total_simpatizantes:
          type: integer
        total_fechados:
          type: integer
        total_lideres:
          type: integer
        lideres:
          type: array
          items:
            $ref: "#/components/schemas/StatsLider"
        observacoes:
          type: array
          items:
            $ref: "#/components/schemas/ObservacaoRegiao"
        proximos_eventos:
          type: array
          items:
            $ref: "#/components/schemas/Evento"
      required: [id, nome, cor, prioridade, created_at, updated_at, total_contatos, total_simpatizantes, total_fechados, total_lideres, lideres, observacoes, proximos_eventos]

    CreateRegiaoBody:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: ["string", "null"]
        coordenador_regional_id:
          type: ["integer", "null"]
        cor:
          type: ["string", "null"]
        prioridade:
          type: ["string", "null"]
        observacao_estrategica:
          type: ["string", "null"]
      required: [nome]

    UpdateRegiaoBody:
      type: object
      properties:
        nome:
          type: ["string", "null"]
        descricao:
          type: ["string", "null"]
        coordenador_regional_id:
          type: ["integer", "null"]
        cor:
          type: ["string", "null"]
        prioridade:
          type: ["string", "null"]
        observacao_estrategica:
          type: ["string", "null"]

    ObservacaoRegiao:
      type: object
      properties:
        id:
          type: integer
        regiao_id:
          type: integer
        autor_id:
          type: integer
        autor_nome:
          type: ["string", "null"]
        observacao:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, regiao_id, autor_id, observacao, created_at]

    CreateObservacaoBody:
      type: object
      properties:
        observacao:
          type: string
      required: [observacao]

    Evento:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: ["string", "null"]
        data:
          type: string
        hora:
          type: ["string", "null"]
        local:
          type: ["string", "null"]
        tipo_evento:
          type: string
          enum: [reuniao, caminhada, visita, comicio, acao_de_rua, evento_interno]
        regiao_id:
          type: ["integer", "null"]
        regiao_nome:
          type: ["string", "null"]
        criado_por:
          type: integer
        criado_por_nome:
          type: ["string", "null"]
        visibilidade:
          type: string
          enum: [geral, regional, lider]
        coordenador_regional_id:
          type: ["integer", "null"]
        lider_id:
          type: ["integer", "null"]
        created_at:
          type: string
          format: date-time
      required: [id, titulo, data, tipo_evento, criado_por, visibilidade, created_at]

    CreateEventoBody:
      type: object
      properties:
        titulo:
          type: string
        descricao:
          type: ["string", "null"]
        data:
